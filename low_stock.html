{% extends 'base.html' %}{% block content %}<h1>Movimiento de inventario</h1><form method="post" class="form"><label>Producto</label><select name="product_id" required>{% for p in products %}<option value="{{p.id}}" {% if selected_product_id|string == p.id|string %}selected{% endif %}>{{p.code}} - {{p.name}} | Stock actual: {{p.quantity}}</option>{% endfor %}</select><label>Tipo de movimiento</label><select name="movement_type"><option value="entrada" {% if selected_type == 'entrada' %}selected{% endif %}>Entrada / Agregar inventario</option><option value="salida" {% if selected_type == 'salida' %}selected{% endif %}>Salida / Retirar inventario</option><option value="ajuste" {% if selected_type == 'ajuste' %}selected{% endif %}>Ajuste / Dejar stock exacto</option></select><label>Cantidad</label><input name="quantity" type="number" min="1" required><label>Notas / Motivo</label><input name="notes" placeholder="Compra, devolución, ajuste, conteo físico"><button>Guardar movimiento</button></form>{% endblock %}
