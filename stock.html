{% extends 'base.html' %}{% block content %}<h1>Productos</h1><a class="btn" href="{{ url_for('new_product') }}">+ Nuevo producto</a><form class="search"><input name="q" value="{{q}}" placeholder="Buscar código, nombre o categoría"><button>Buscar</button></form><table><tr><th>Código</th><th>Producto</th><th>Categoría</th><th>Stock</th><th>Mínimo</th><th>Ubicación</th><th>Acciones</th></tr>{% for p in products %}<tr class="{% if p.quantity <= p.min_stock %}low{% endif %}"><td>{{p.code}}</td><td>{{p.name}}</td><td>{{p.category}}</td><td>{{p.quantity}}</td><td>{{p.min_stock}}</td><td>{{p.location}}</td><td><a class="btn" href="{{ url_for('stock', product_id=p.id, type='entrada') }}">+ Stock</a> <a class="btn" href="{{ url_for('stock', product_id=p.id, type='salida') }}">- Stock</a></td></tr>{% endfor %}</table>{% endblock %}
