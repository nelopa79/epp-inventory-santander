{% extends 'base.html' %}{% block content %}<h1>Empleados por sticker</h1><form method="post" class="form grid"><input name="sticker" placeholder="Sticker" required><input name="name" placeholder="Nombre" required><input name="position" placeholder="Cargo"><input list="companies" name="company" placeholder="Empresa / Contratista"><datalist id="companies">{% for c in companies %}<option value="{{c.name}}">{% endfor %}</datalist><button>Guardar empleado</button></form><table><tr><th>Sticker</th><th>Nombre</th><th>Cargo</th><th>Empresa</th><th>Activo</th></tr>{% for e in employees %}<tr><td>{{e.sticker}}</td><td>{{e.name}}</td><td>{{e.position}}</td><td>{{e.company}}</td><td>{{'Sí' if e.active else 'No'}}</td></tr>{% endfor %}</table>{% endblock %}
