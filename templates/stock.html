{% extends 'base.html' %}{% block content %}<h1>Entrada / salida de stock</h1><form method="post" class="form"><label>Producto</label><select name="product_id">{% for p in products %}<option value="{{p.id}}">{{p.code}} - {{p.name}} (Stock: {{p.quantity}})</option>{% endfor %}</select><label>Movimiento</label><select name="movement_type"><option value="entrada">Entrada</option><option value="salida">Salida</option><option value="ajuste">Ajuste total</option></select><label>Cantidad</label><input name="quantity" type="number" min="1" required><label>Nota</label><input name="notes"><button>Guardar movimiento</button></form>{% endblock %}
