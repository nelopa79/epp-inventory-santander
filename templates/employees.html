{% extends 'base.html' %}
{% block content %}
<h1>Empleados por sticker</h1>
<form method="post" class="form grid">
  <input name="sticker" placeholder="Sticker" required>
  <input name="name" placeholder="Nombre" required>
  <input name="position" placeholder="Cargo">
  <select name="company">
    <option value="">Empresa / Contratista</option>
    {% for c in companies %}<option value="{{c.name}}">{{c.name}}</option>{% endfor %}
  </select>
  <button>Guardar empleado</button>
</form>
<table>
<tr><th>Sticker</th><th>Nombre</th><th>Cargo</th><th>Empresa</th><th>Activo</th><th>Acciones</th></tr>
{% for e in employees %}
<tr>
  <td>{{e.sticker}}</td>
  <td>{{e.name}}</td>
  <td>{{e.position}}</td>
  <td>{{e.company}}</td>
  <td>{{'Sí' if e.active else 'No'}}</td>
  <td>
    <a class="btn" href="{{ url_for('edit_employee', employee_id=e.id) }}">Editar</a>
    <a class="btn" href="{{ url_for('toggle_employee', employee_id=e.id) }}">{{ 'Inactivar' if e.active else 'Activar' }}</a>
  </td>
</tr>
{% endfor %}
</table>
{% endblock %}
