{% extends 'base.html' %}{% block content %}<h1>Nueva entrega EPP</h1><form method="post" enctype="multipart/form-data" class="form"><label>Empleado / Sticker</label><select name="employee_id">{% for e in employees %}<option value="{{e.id}}">{{e.sticker}} - {{e.name}}</option>{% endfor %}</select><label>Producto</label><select name="product_id">{% for p in products %}<option value="{{p.id}}">{{p.code}} - {{p.name}} (Stock: {{p.quantity}})</option>{% endfor %}</select><label>Cantidad</label><input name="quantity" type="number" min="1" required><label>Foto de evidencia</label><input name="photo" type="file" accept="image/*" capture="environment"><button>Guardar entrega</button></form>{% endblock %}
