{% extends "base.html" %}
{% block content %}
<h1>Nueva entrega de dotación</h1>
<form method="post" enctype="multipart/form-data" class="form-card">
  <label>Empleado</label>
  <select name="employee_id" required>
    {% for employee in employees %}<option value="{{ employee.id }}">{{ employee.name }}</option>{% endfor %}
  </select>
  <label>Producto</label>
  <select name="product_id" required>
    {% for product in products %}<option value="{{ product.id }}">{{ product.name }} - Disponible: {{ product.quantity }}</option>{% endfor %}
  </select>
  <label>Cantidad</label><input name="quantity" type="number" min="1" required>
  <label>Foto de evidencia</label><input name="photo" type="file" accept="image/*" capture="environment">
  <label>Notas</label><textarea name="notes" placeholder="Ejemplo: Entrega inicial, reposición, cambio por daño..."></textarea>
  <button class="button">Registrar entrega</button>
</form>
{% endblock %}
